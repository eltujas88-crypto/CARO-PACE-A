@media(max-width:400px){.fila1{grid-template-columns:0.6fr 1fr auto;gap:6px;}.fila1 .field select,.fila1 .field input{font-size:12px;height:32px;}.ref-tc{font-size:11px;min-width:50px;height:32px;}#btnConfig{width:32px;height:32px;font-size:14px;}.fila2 .field input{height:38px;font-size:14px;}.content-horizontal .send,.content-horizontal .receive,.content-horizontal-pacena .send,.content-horizontal-pacena .receive{font-size:22px;}.content-horizontal .moneda-send-h,.content-horizontal .moneda-receive-h,.content-horizontal-pacena .moneda-send-h,.content-horizontal-pacena .moneda-receive-h{font-size:14px;}#tituloEmpresa{font-size:17px;}.pacena #tituloEmpresa{font-size:15px !important;}.fecha-text{font-size:13px;}.currency{font-size:13px;padding:8px 6px;}.footer{font-size:11px;padding:8px 12px;}.footer #tcVista{font-size:14px;}.content-horizontal-pacena .comision-center{font-size:10px;padding:3px 10px;}.content-horizontal-pacena .tc-row .tc-value{font-size:22px;}.content-horizontal-pacena .tc-row .tc-label{font-size:9px;}.watermark-text .watermark-nombre{font-size:20px !important;}.watermark-text .watermark-numero{font-size:26px !important;}.watermark-text.small .watermark-nombre{font-size:16px !important;}.watermark-text.small .watermark-numero{font-size:20px !important;}}

</style>

<body>
<div class="container">

</div>

</div>
</div>
<script>
const empresa=document.getElementById("empresa"),operacion=document.getElementById("operacion"),tcBsSoles=document.getElementById("tcBsSoles"),tcSolesBs=document.getElementById("tcSolesBs"),ajusteMas=document.getElementById("ajusteMas"),ajusteMenos=document.getElementById("ajusteMenos"),comision=document.getElementById("comision"),depositar=document.getElementById("depositar"),recibe=document.getElementById("recibe"),tarjeta=document.getElementById("tarjeta"),tituloEmpresa=document.getElementById("tituloEmpresa"),subtituloEmpresa=document.getElementById("subtituloEmpresa"),barraOperacion=document.getElementById("barraOperacion"),enviaVistaH=document.getElementById("enviaVistaH"),recibeVistaH=document.getElementById("recibeVistaH"),enviaVistaP=document.getElementById("enviaVistaP"),recibeVistaP=document.getElementById("recibeVistaP"),tcVista=document.getElementById("tcVista"),refTc=document.getElementById("refTc"),fechaText=document.getElementById("fechaText"),comisionCenterPacena=document.getElementById("comisionCenterPacena"),tcPacena=document.getElementById("tcPacena"),footerNormal=document.getElementById("footerNormal"),horaPacena=document.getElementById("horaPacena"),watermarkText=document.getElementById("watermarkText"),monedaSendH=document.getElementById("monedaSendH"),monedaRecibeH=document.getElementById("monedaRecibeH"),monedaSendP=document.getElementById("monedaSendP"),monedaRecibeP=document.getElementById("monedaRecibeP"),labelDepositaH=document.getElementById("labelDepositaH"),labelRecibeH=document.getElementById("labelRecibeH"),labelDepositaP=document.getElementById("labelDepositaP"),labelRecibeP=document.getElementById("labelRecibeP"),contenidoHorizontal=document.getElementById("contenidoHorizontal"),contenidoPacena=document.getElementById("contenidoPacena"),flechaHorizontal=document.getElementById("flechaHorizontal"),flechaPacena=document.getElementById("flechaPacena"),monedaDeposita=document.getElementById("monedaDeposita"),monedaRecibe=document.getElementById("monedaRecibe"),btnConfig=document.getElementById("btnConfig"),configPanel=document.getElementById("configPanel");let configAbierto=!1,ultimoCampo="depositar";function formato(n){return Number(n).toFixed(2)}

function getTcMostrado(){let e=0;e="bs_soles"===operacion.value?parseFloat(tcBsSoles.value||0):parseFloat(tcSolesBs.value||0);if("pacena"===empresa.value)return e;let t=0;return"bs_soles"===operacion.value?(t=parseFloat(ajusteMas.value||0),e+t):(t=parseFloat(ajusteMenos.value||0),e-t)}

function actualizarEmpresa(){"chacaltaya"===empresa.value?(tarjeta.className="card chacaltaya",tituloEmpresa.innerHTML="CHACALTAYA",subtituloEmpresa.innerHTML="casa de cambios",contenidoHorizontal.style.display="grid",contenidoPacena.style.display="none",flechaHorizontal.textContent="→",tcVista.style.display="block",footerNormal.style.display="flex",watermarkText.className="watermark-text"):"pacena"===empresa.value&&(tarjeta.className="card pacena",tituloEmpresa.innerHTML="TRANSPORTADORA LA PACEÑA",subtituloEmpresa.innerHTML="",contenidoHorizontal.style.display="none",contenidoPacena.style.display="grid",flechaPacena.textContent="→",tcVista.style.display="none",footerNormal.style.display="flex",watermarkText.className="watermark-text small")}
function calcular(){let e=parseFloat(depositar.value||0),t=parseFloat(recibe.value||0),n=getTcMostrado(),a=0,i=0;"pacena"===empresa.value&&(a=getComision(),i=parseFloat(comision.value||0));if("bs_soles"===operacion.value){barraOperacion.innerHTML="BOLIVIANOS → SOLES";if("depositar"===ultimoCampo){t=e/(n*(1+a));recibe.value=t?formato(t):""}else{e=t*n*(1+a);depositar.value=e?formato(e):""}}else{barraOperacion.innerHTML="SOLES → BOLIVIANOS";if("depositar"===ultimoCampo){t=e*n*(1-a);recibe.value=t?formato(t):""}else{e=t/(n*(1-a));depositar.value=e?formato(e):""}}enviaVistaH.innerHTML=depositar.value||"0.00";recibeVistaH.innerHTML=recibe.value||"0.00";enviaVistaP.innerHTML=depositar.value||"0.00";recibeVistaP.innerHTML=recibe.value||"0.00";tcPacena&&(tcPacena.textContent=formato(n));i>0?(comisionCenterPacena&&(comisionCenterPacena.textContent="COMISIÓN "+i+"%",comisionCenterPacena.style.display="block")):comisionCenterPacena&&(comisionCenterPacena.style.display="none");"chacaltaya"===empresa.value?(tcVista.innerHTML="T/C "+formato(n),tcVista.style.display="block"):tcVista.style.display="none";refTc.innerHTML="T/C "+formato(n);actualizarMonedas()}

operacion.addEventListener("change",function(){actualizarMonedas()});document.getElementById("btnLimpiar").addEventListener("click",()=>{depositar.value="";recibe.value="";enviaVistaH.innerHTML="0.00";recibeVistaH.innerHTML="0.00";enviaVistaP.innerHTML="0.00";recibeVistaP.innerHTML="0.00"});
document.getElementById("btnGuardar").addEventListener("click",()=>{html2canvas(document.getElementById("tarjeta"),{scale:3,backgroundColor:null,useCORS:!0,logging:!1,width:document.getElementById("tarjeta").offsetWidth,height:document.getElementById("tarjeta").offsetHeight}).then(e=>{const t=document.createElement("a");t.download="cotizacion.png";t.href=e.toDataURL();t.click()})});
function guardarDatos(){localStorage.setItem("empresa",empresa.value);localStorage.setItem("tcBsSoles",tcBsSoles.value);localStorage.setItem("tcSolesBs",tcSolesBs.value);localStorage.setItem("ajusteMas",ajusteMas.value);localStorage.setItem("ajusteMenos",ajusteMenos.value);localStorage.setItem("comision",comision.value);localStorage.setItem("operacion",operacion.value)}
[empresa,operacion,tcBsSoles,tcSolesBs,ajusteMas,ajusteMenos,comision].forEach(e=>{e.addEventListener("input",guardarDatos);e.addEventListener("change",guardarDatos)});
function guardarTcAutomatically(){localStorage.setItem("tcBsSoles",tcBsSoles.value);localStorage.setItem("tcSolesBs",tcSolesBs.value);localStorage.setItem("ajusteMas",ajusteMas.value);localStorage.setItem("ajusteMenos",ajusteMenos.value);localStorage.setItem("comision",comision.value)}
tcBsSoles.addEventListener("input",guardarTcAutomatically);tcSolesBs.addEventListener("input",guardarTcAutomatically);ajusteMas.addEventListener("input",guardarTcAutomatically);ajusteMenos.addEventListener("input",guardarTcAutomatically);comision.addEventListener("input",guardarTcAutomatically);
window.onload=()=>{empresa.value=localStorage.getItem("empresa")||"chacaltaya";tcBsSoles.value=localStorage.getItem("tcBsSoles")||"2.92";tcSolesBs.value=localStorage.getItem("tcSolesBs")||"2.76";ajusteMas.value=localStorage.getItem("ajusteMas")||"0.03";ajusteMenos.value=localStorage.getItem("ajusteMenos")||"0.03";comision.value=localStorage.getItem("comision")||"3";operacion.value=localStorage.getItem("operacion")||"soles_bs";actualizarFecha();actualizarHora();actualizarEmpresa();actualizarMonedas();calcular();setInterval(actualizarHora,6e4)};
empresa.addEventListener("change",actualizarEmpresa);
</script>
