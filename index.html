<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Cambios - CHACALTAYA & PACEÑA</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: #c0c9d4;
min-height: 100vh;
padding:10px;
}

.container{
max-width:480px;
margin:auto;
width:100%;
}

.panel{
background: rgba(255, 255, 255, 0.85);
backdrop-filter: blur(10px);
padding:12px;
border-radius:16px;
margin-bottom:15px;
border: 1px solid rgba(255,255,255,0.3);
box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* FILA 1 - Empresa, Operación y Botón Config */
.fila1{
display:grid;
grid-template-columns: 0.7fr 1fr auto;
gap:8px;
align-items:center;
margin-bottom:8px;
}

.fila1 .field{
margin-bottom:0;
}

.fila1 .field label{
display:block;
font-size:11px;
font-weight:700;
margin-bottom:2px;
color:#374151;
}

.fila1 .field input,
.fila1 .field select{
width:100%;
height:36px;
background:white;
border: 2px solid #d1d5db;
border-radius:8px;
padding:0 10px;
color:#111827;
font-size:13px;
transition: border-color 0.3s;
}

.fila1 .field input:focus,
.fila1 .field select:focus{
outline: none;
border-color: #f59e0b;
box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
}

/* Contenedor de Operación con referencia */
.operacion-wrapper{
display:flex;
gap:6px;
align-items:center;
}

.operacion-wrapper select{
flex:1;
}

.ref-tc{
font-size:13px;
font-weight:800;
color:#f59e0b;
background:#1f2937;
padding:2px 8px;
border-radius:6px;
white-space:nowrap;
min-width:60px;
text-align:center;
height:36px;
display:flex;
align-items:center;
justify-content:center;
border: 2px solid #f59e0b;
}

/* Botón Configuración */
#btnConfig{
background:#374151;
color:white;
border:none;
border-radius:8px;
width:38px;
height:36px;
cursor:pointer;
font-size:16px;
transition: all 0.3s;
display:flex;
align-items:center;
justify-content:center;
}

#btnConfig:hover{
background:#f59e0b;
transform:rotate(90deg);
}

/* Panel de Configuración desplegable */
.config-panel{
max-height:0;
overflow:hidden;
transition: max-height 0.4s ease, opacity 0.3s ease, padding 0.3s ease;
opacity:0;
padding:0 5px;
}

.config-panel.abierto{
max-height:500px;
opacity:1;
padding:8px 5px 5px 5px;
}

.config-panel .field{
margin-bottom:6px;
}

.config-panel .field label{
display:block;
font-size:11px;
font-weight:700;
margin-bottom:2px;
color:#374151;
}

.config-panel .field input{
width:100%;
height:36px;
background:white;
border: 2px solid #d1d5db;
border-radius:8px;
padding:0 10px;
color:#111827;
font-size:13px;
transition: border-color 0.3s;
}

.config-panel .field input:focus{
outline: none;
border-color: #f59e0b;
box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
}

.config-panel .grid-config{
display:grid;
grid-template-columns: 1fr 1fr;
gap:8px;
}

/* FILA 2 - Deposita y Recibe */
.fila2{
display:grid;
grid-template-columns: 1fr 1fr;
gap:8px;
}

.fila2 .field{
margin-bottom:0;
}

.fila2 .field label{
display:block;
font-size:11px;
font-weight:700;
margin-bottom:2px;
color:#374151;
}

.fila2 .field input{
width:100%;
height:42px;
background:white;
border: 2px solid #d1d5db;
border-radius:8px;
padding:0 12px;
color:#111827;
font-size:16px;
font-weight:700;
transition: border-color 0.3s;
}

.fila2 .field input:focus{
outline: none;
border-color: #f59e0b;
box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
}

/* Etiquetas de moneda en los campos */
.moneda-label{
font-size:11px;
font-weight:700;
color:#6b7280;
margin-left:3px;
}

.buttons{
display:flex;
gap:8px;
margin-top:10px;
}

.buttons button{
flex:1;
height:40px;
border:none;
border-radius:10px;
font-weight:700;
font-size:13px;
cursor:pointer;
transition: transform 0.2s, box-shadow 0.2s;
}

.buttons button:active{
transform: scale(0.96);
}

#btnLimpiar{
background:#9ca3af;
color:white;
}

#btnGuardar{
background:#f59e0b;
color:black;
}

/* ==================== */
/* TARJETA - RESPONSIVE */
/* ==================== */

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 30px rgba(0,0,0,.15);
width:100%;
max-width:480px;
margin:0 auto;
}

.header{
padding:14px 16px 10px;
text-align:center;
position:relative;
overflow:hidden;
}

#tituloEmpresa{
font-size:20px;
font-weight:900;
letter-spacing:1px;
position:relative;
z-index:2;
}

#subtituloEmpresa{
font-size:16px;
margin-top:1px;
font-weight:600;
position:relative;
z-index:2;
}

.fila-fecha-tc{
display:flex;
justify-content:center;
align-items:center;
gap:12px;
margin-top:4px;
position:relative;
z-index:2;
flex-wrap:wrap;
}

.fecha-text{
font-size:15px;
font-weight:800;
}

.currency{
text-align:center;
padding:10px 8px;
font-size:15px;
font-weight:800;
letter-spacing:0.5px;
}

/* ESTILO HORIZONTAL (CHACALTAYA) */
.content-horizontal{
padding:14px 16px 16px;
background:white;
display:grid;
grid-template-columns: 1fr auto 1fr;
align-items:center;
gap:12px;
text-align:center;
}

.content-horizontal .col{
display:flex;
flex-direction:column;
align-items:center;
}

.content-horizontal .label{
font-size:12px;
text-transform:uppercase;
color:#6b7280;
font-weight:700;
letter-spacing:1px;
margin-bottom:3px;
}

.content-horizontal .valor{
display:flex;
align-items:center;
gap:4px;
flex-wrap:wrap;
justify-content:center;
}

.content-horizontal .send{
font-size:28px;
font-weight:900;
color:#111111;
}

.content-horizontal .moneda-send-h{
font-size:18px;
font-weight:700;
color:#6b7280;
}

.content-horizontal .arrow{
font-size:28px;
font-weight:700;
}

.content-horizontal .receive{
font-size:28px;
font-weight:900;
}

.content-horizontal .moneda-receive-h{
font-size:18px;
font-weight:700;
color:#6b7280;
}

/* ======================================== */
/* ESTILO PACEÑA */
/* ======================================== */
.content-horizontal-pacena{
padding:14px 16px 16px;
background:white;
display:grid;
grid-template-columns: 1fr auto 1fr;
align-items:center;
gap:6px;
text-align:center;
}

.content-horizontal-pacena .tc-row{
grid-column: 1 / -1;
text-align:center;
margin-bottom:2px;
display:flex;
flex-direction:column;
align-items:center;
}

.content-horizontal-pacena .tc-row .tc-value{
font-size:26px;
font-weight:900;
color:#000000;
line-height:1.2;
}

.content-horizontal-pacena .tc-row .tc-label{
font-size:10px;
text-transform:uppercase;
color:#6b7280;
font-weight:600;
letter-spacing:0.5px;
margin-top:1px;
}

.content-horizontal-pacena .col{
display:flex;
flex-direction:column;
align-items:center;
}

.content-horizontal-pacena .label{
font-size:12px;
text-transform:uppercase;
color:#6b7280;
font-weight:700;
letter-spacing:1px;
margin-bottom:3px;
}

.content-horizontal-pacena .valor{
display:flex;
align-items:center;
gap:4px;
flex-wrap:wrap;
justify-content:center;
}

.content-horizontal-pacena .send{
font-size:28px;
font-weight:900;
color:#111111;
}

.content-horizontal-pacena .moneda-send-h{
font-size:18px;
font-weight:700;
color:#6b7280;
}

.content-horizontal-pacena .arrow{
font-size:28px;
font-weight:700;
color:#cc0000;
}

.content-horizontal-pacena .receive{
font-size:28px;
font-weight:900;
color:#cc0000;
}

.content-horizontal-pacena .moneda-receive-h{
font-size:18px;
font-weight:700;
color:#6b7280;
}

.content-horizontal-pacena .comision-center{
grid-column: 1 / -1;
text-align:center;
font-size:12px;
font-weight:700;
color:#000000;
background:#d1d5db;
padding:4px 14px;
border-radius:20px;
border:1px solid #9ca3af;
margin-top:-2px;
letter-spacing:0.5px;
}

.footer{
padding:10px 16px;
display:flex;
justify-content:space-between;
border-top:2px solid #e5e7eb;
color:#6b7280;
font-weight:700;
font-size:13px;
background:white;
flex-wrap:wrap;
gap:4px;
}

.footer #tcVista{
font-size:16px;
font-weight:800;
color:#111827;
}

/* ==================== */
/* ESTILOS POR EMPRESA - RESPONSIVE */
/* ==================== */

/* CHACALTAYA */
.chacaltaya .header{ background:#2d5a27; }
.chacaltaya #tituloEmpresa{ color:#D6E6A1; }
.chacaltaya #subtituloEmpresa{ color:#D6E6A1; font-family:'Dancing Script',cursive; font-size:18px; font-weight:700; }
.chacaltaya .fecha-text{ color:white; }
.chacaltaya .currency{ background:#D6E6A1; color:#111111; }
.chacaltaya .arrow{ color:#D6E6A1; }
.chacaltaya .receive{ color:#D6E6A1; }

/* ===== PACEÑA ===== */
.pacena .header{ 
    background: linear-gradient(135deg, #8B0000, #4a0000);
    border-bottom: 3px solid #ff4444;
}
.pacena #tituloEmpresa{ 
    color: #ffdddd;
    font-size: 17px;
    letter-spacing: 1px;
    font-weight: 900;
}
.pacena #subtituloEmpresa{ 
    display: none;
}
.pacena .fecha-text{ color: #ffcccc; }
.pacena .currency{ 
    background: linear-gradient(135deg, #cc0000, #880000);
    color: white;
    font-weight: 800;
}
.pacena .content-horizontal-pacena .arrow{ 
    color: #ff4444;
    font-weight: 900;
}
.pacena .content-horizontal-pacena .receive{ 
    color: #cc0000;
}
.pacena .content-horizontal-pacena .send{ 
    color: #222222;
}
.pacena .content-horizontal-pacena .tc-row .tc-value{
    color: #000000 !important;
}
.pacena .content-horizontal-pacena .tc-row .tc-label{
    color: #999999 !important;
}
.pacena .content-horizontal-pacena .comision-center{
    color: #000000;
    background: #d1d5db;
    border-color: #9ca3af;
}
.pacena .footer{ 
    border-top-color: #cc0000;
}
.pacena .footer #tcVista{ 
    display: none !important;
}

/* ==================== */
/* RESPONSIVE EXTRA */
/* ==================== */

@media (max-width: 400px){
    .fila1{
        grid-template-columns: 0.6fr 1fr auto;
        gap:6px;
    }
    .fila1 .field select,
    .fila1 .field input{
        font-size:12px;
        height:32px;
    }
    .ref-tc{
        font-size:11px;
        min-width:50px;
        height:32px;
    }
    #btnConfig{
        width:32px;
        height:32px;
        font-size:14px;
    }
    .fila2 .field input{
        height:38px;
        font-size:14px;
    }
    .content-horizontal .send,
    .content-horizontal .receive,
    .content-horizontal-pacena .send,
    .content-horizontal-pacena .receive{
        font-size:22px;
    }
    .content-horizontal .moneda-send-h,
    .content-horizontal .moneda-receive-h,
    .content-horizontal-pacena .moneda-send-h,
    .content-horizontal-pacena .moneda-receive-h{
        font-size:14px;
    }
    #tituloEmpresa{
        font-size:17px;
    }
    .pacena #tituloEmpresa{
        font-size:15px !important;
    }
    .fecha-text{
        font-size:13px;
    }
    .currency{
        font-size:13px;
        padding:8px 6px;
    }
    .footer{
        font-size:11px;
        padding:8px 12px;
    }
    .footer #tcVista{
        font-size:14px;
    }
    .content-horizontal-pacena .comision-center{
        font-size:10px;
        padding:3px 10px;
    }
    .content-horizontal-pacena .tc-row .tc-value{
        font-size:22px;
    }
    .content-horizontal-pacena .tc-row .tc-label{
        font-size:9px;
    }
}

@media (max-width: 360px){
    .fila1{
        grid-template-columns: 1fr;
        gap:6px;
    }
    .fila1 .field{
        width:100%;
    }
    .operacion-wrapper{
        width:100%;
    }
    .fila2{
        grid-template-columns: 1fr;
        gap:6px;
    }
    .config-panel .grid-config{
        grid-template-columns: 1fr;
    }
    .content-horizontal,
    .content-horizontal-pacena{
        grid-template-columns: 1fr;
        gap:6px;
    }
    .content-horizontal .arrow,
    .content-horizontal-pacena .arrow{
        transform: rotate(90deg);
    }
    .buttons{
        flex-direction:column;
    }
}

</style>
</head>
<body>
<div class="container">

<div class="panel">

<!-- FILA 1: Empresa + Operación + Botón Config -->
<div class="fila1">
    <div class="field">
        <label>EMPRESA</label>
        <select id="empresa">
            <option value="chacaltaya">CHACALTAYA</option>
            <option value="pacena">PACEÑA</option>
        </select>
    </div>
    <div class="field">
        <label>OPERACIÓN</label>
        <div class="operacion-wrapper">
            <select id="operacion">
                <option value="bs_soles">BS → SOLES</option>
                <option value="soles_bs">SOLES → BS</option>
            </select>
            <span id="refTc" class="ref-tc">T/C 0.00</span>
        </div>
    </div>
    <button id="btnConfig">⚙️</button>
</div>

<!-- PANEL DE CONFIGURACIÓN DESPLEGABLE -->
<div id="configPanel" class="config-panel">
    <div class="grid-config">
        <div class="field">
            <label>TC BS → SOLES</label>
            <input type="number" id="tcBsSoles" value="2.92" step="0.01">
        </div>
        <div class="field">
            <label>TC SOLES → BS</label>
            <input type="number" id="tcSolesBs" value="2.76" step="0.01">
        </div>
        <div class="field">
            <label>AJUSTE +</label>
            <input type="number" id="ajusteMas" value="0.03" step="0.01">
        </div>
        <div class="field">
            <label>AJUSTE -</label>
            <input type="number" id="ajusteMenos" value="0.03" step="0.01">
        </div>
        <div class="field" style="grid-column: span 2;">
            <label>COMISIÓN PACEÑA (%)</label>
            <input type="number" id="comision" value="3" step="0.1" min="0" max="100">
        </div>
    </div>
</div>

<!-- FILA 2: Deposita + Recibe -->
<div class="fila2">
    <div class="field">
        <label id="labelDeposita">DEPOSITA <span class="moneda-label" id="monedaDeposita">(BS)</span></label>
        <input type="number" id="depositar">
    </div>
    <div class="field">
        <label id="labelRecibe">RECIBE <span class="moneda-label" id="monedaRecibe">(SOLES)</span></label>
        <input type="number" id="recibe">
    </div>
</div>

<div class="buttons">
    <button id="btnLimpiar">LIMPIAR</button>
    <button id="btnGuardar">📸 GUARDAR</button>
</div>

</div>

<div id="tarjeta" class="card chacaltaya">

<div class="header">

<div id="tituloEmpresa">
CHACALTAYA
</div>

<div id="subtituloEmpresa">casa de cambios</div>

<div id="filaFechaTc" class="fila-fecha-tc">
    <span id="fechaText" class="fecha-text">17 JUN 2026</span>
</div>

</div>

<!-- BARRA DE OPERACIÓN -->
<div id="barraOperacion" class="currency">
SOLES → BOLIVIANOS
</div>

<!-- CONTENIDO HORIZONTAL (CHACALTAYA) -->
<div id="contenidoHorizontal" class="content-horizontal">

<div class="col">
    <div class="label" id="labelDepositaH">Deposita</div>
    <div class="valor">
        <span id="enviaVistaH" class="send">0.00</span>
        <span id="monedaSendH" class="moneda-send-h">BS</span>
    </div>
</div>

<div class="arrow" id="flechaHorizontal">→</div>

<div class="col">
    <div class="label" id="labelRecibeH">Recibe</div>
    <div class="valor">
        <span id="recibeVistaH" class="receive">0.00</span>
        <span id="monedaRecibeH" class="moneda-receive-h">SOLES</span>
    </div>
</div>

</div>

<!-- CONTENIDO PACEÑA -->
<div id="contenidoPacena" class="content-horizontal-pacena" style="display:none;">

<div class="tc-row">
    <span class="tc-value" id="tcPacena">2.92</span>
    <span class="tc-label">TIPO DE CAMBIO</span>
</div>

<div class="col">
    <div class="label" id="labelDepositaP">Deposita</div>
    <div class="valor">
        <span id="enviaVistaP" class="send">0.00</span>
        <span id="monedaSendP" class="moneda-send-h">BS</span>
    </div>
</div>

<div class="arrow" id="flechaPacena">→</div>

<div class="col">
    <div class="label" id="labelRecibeP">Recibe</div>
    <div class="valor">
        <span id="recibeVistaP" class="receive">0.00</span>
        <span id="monedaRecibeP" class="moneda-receive-h">SOLES</span>
    </div>
</div>

<div class="comision-center" id="comisionCenterPacena">COMISIÓN 3%</div>

</div>

<!-- FOOTER -->
<div class="footer" id="footerNormal">
    <span id="tcVista">T/C 0.00</span>
    <span>⏱ VIGENCIA 15 min</span>
</div>

</div>

</div>
<script>

const empresa = document.getElementById("empresa");
const operacion = document.getElementById("operacion");

const tcBsSoles = document.getElementById("tcBsSoles");
const tcSolesBs = document.getElementById("tcSolesBs");

const ajusteMas = document.getElementById("ajusteMas");
const ajusteMenos = document.getElementById("ajusteMenos");
const comision = document.getElementById("comision");

const depositar = document.getElementById("depositar");
const recibe = document.getElementById("recibe");

const tarjeta = document.getElementById("tarjeta");

const tituloEmpresa = document.getElementById("tituloEmpresa");
const subtituloEmpresa = document.getElementById("subtituloEmpresa");

const barraOperacion = document.getElementById("barraOperacion");

const enviaVistaH = document.getElementById("enviaVistaH");
const recibeVistaH = document.getElementById("recibeVistaH");
const enviaVistaP = document.getElementById("enviaVistaP");
const recibeVistaP = document.getElementById("recibeVistaP");
const tcVista = document.getElementById("tcVista");
const refTc = document.getElementById("refTc");
const fechaText = document.getElementById("fechaText");
const comisionCenterPacena = document.getElementById("comisionCenterPacena");
const tcPacena = document.getElementById("tcPacena");
const footerNormal = document.getElementById("footerNormal");

// Monedas horizontales CHACALTAYA
const monedaSendH = document.getElementById("monedaSendH");
const monedaRecibeH = document.getElementById("monedaRecibeH");

// Monedas horizontales PACEÑA
const monedaSendP = document.getElementById("monedaSendP");
const monedaRecibeP = document.getElementById("monedaRecibeP");

const labelDepositaH = document.getElementById("labelDepositaH");
const labelRecibeH = document.getElementById("labelRecibeH");
const labelDepositaP = document.getElementById("labelDepositaP");
const labelRecibeP = document.getElementById("labelRecibeP");

const contenidoHorizontal = document.getElementById("contenidoHorizontal");
const contenidoPacena = document.getElementById("contenidoPacena");
const flechaHorizontal = document.getElementById("flechaHorizontal");
const flechaPacena = document.getElementById("flechaPacena");

const monedaDeposita = document.getElementById("monedaDeposita");
const monedaRecibe = document.getElementById("monedaRecibe");

const btnConfig = document.getElementById("btnConfig");
const configPanel = document.getElementById("configPanel");

let configAbierto = false;
let ultimoCampo = "depositar";

function formato(n){
return Number(n).toFixed(2);
}

// Actualizar etiquetas de moneda
function actualizarMonedas(){
    if(operacion.value === "bs_soles"){
        // BS → SOLES
        monedaDeposita.textContent = "(BS)";
        monedaRecibe.textContent = "(SOLES)";
        
        // Monedas horizontales CHACALTAYA
        monedaSendH.textContent = "BS";
        monedaRecibeH.textContent = "SOLES";
        
        // Monedas horizontales PACEÑA
        monedaSendP.textContent = "BS";
        monedaRecibeP.textContent = "SOLES";
        
    } else {
        // SOLES → BS
        monedaDeposita.textContent = "(SOLES)";
        monedaRecibe.textContent = "(BS)";
        
        // Monedas horizontales CHACALTAYA
        monedaSendH.textContent = "SOLES";
        monedaRecibeH.textContent = "BS";
        
        // Monedas horizontales PACEÑA
        monedaSendP.textContent = "SOLES";
        monedaRecibeP.textContent = "BS";
    }
}

// Obtener el T/C que se muestra
// Para Paceña: usa el TC directo del campo sin ajustes
// Para Chacaltaya: aplica los ajustes
function getTcMostrado(){
    let tc = 0;
    if(operacion.value === "bs_soles"){
        tc = parseFloat(tcBsSoles.value||0);
    } else {
        tc = parseFloat(tcSolesBs.value||0);
    }
    
    // Paceña: NO aplica ajustes, usa el TC tal cual
    if(empresa.value === "pacena"){
        return tc;
    }
    
    // Chacaltaya: aplica ajustes
    let aj = 0;
    if(operacion.value === "bs_soles"){
        aj = parseFloat(ajusteMas.value||0);
        return tc + aj;
    } else {
        aj = parseFloat(ajusteMenos.value||0);
        return tc - aj;
    }
}

// Obtener la comisión para Paceña
function getComision(){
    return parseFloat(comision.value||0) / 100;
}

// Toggle del panel de configuración
btnConfig.addEventListener("click", function(){
    configAbierto = !configAbierto;
    if(configAbierto){
        configPanel.classList.add("abierto");
        btnConfig.style.background = "#f59e0b";
        btnConfig.style.transform = "rotate(180deg)";
    }else{
        configPanel.classList.remove("abierto");
        btnConfig.style.background = "#374151";
        btnConfig.style.transform = "rotate(0deg)";
    }
});

function actualizarFecha(){

const fecha = new Date();

const meses = [
"ENE","FEB","MAR","ABR",
"MAY","JUN","JUL","AGO",
"SEP","OCT","NOV","DIC"
];

const fechaStr = String(fecha.getDate()).padStart(2, '0') + " " +
meses[fecha.getMonth()] + " " +
fecha.getFullYear();

if(fechaText) fechaText.textContent = fechaStr;

}

function actualizarEmpresa(){

if(empresa.value==="chacaltaya"){

tarjeta.className="card chacaltaya";

tituloEmpresa.innerHTML=
"CHACALTAYA";

subtituloEmpresa.innerHTML=
"casa de cambios";

contenidoHorizontal.style.display = "grid";
contenidoPacena.style.display = "none";
flechaHorizontal.textContent = "→";
tcVista.style.display = "block";
footerNormal.style.display = "flex";

}else if(empresa.value==="pacena"){

tarjeta.className="card pacena";

tituloEmpresa.innerHTML=
"TRANSPORTADORA LA PACEÑA";

subtituloEmpresa.innerHTML="";

contenidoHorizontal.style.display = "none";
contenidoPacena.style.display = "grid";
flechaPacena.textContent = "→";
tcVista.style.display = "none";
footerNormal.style.display = "flex";

}

}

function calcular(){

let dep = parseFloat(
depositar.value || 0
);

let rec = parseFloat(
recibe.value || 0
);

let tcMostrado = getTcMostrado();
let comisionVal = 0;
let comisionPorcentaje = 0;

// Solo Paceña tiene comisión
if(empresa.value === "pacena"){
    comisionVal = getComision();
    comisionPorcentaje = parseFloat(comision.value||0);
}

if(operacion.value==="bs_soles"){

barraOperacion.innerHTML =
"BOLIVIANOS → SOLES";

if(ultimoCampo==="depositar"){

    rec = dep / (tcMostrado * (1 + comisionVal));

recibe.value = rec ? formato(rec) : "";

}else{

    dep = rec * tcMostrado * (1 + comisionVal);

depositar.value = dep ? formato(dep) : "";

}

}else{

barraOperacion.innerHTML =
"SOLES → BOLIVIANOS";

if(ultimoCampo==="depositar"){

    rec = dep * tcMostrado * (1 - comisionVal);

recibe.value = rec ? formato(rec) : "";

}else{

    dep = rec / (tcMostrado * (1 - comisionVal));

depositar.value = dep ? formato(dep) : "";

}

}

// Actualizar vista horizontal CHACALTAYA
enviaVistaH.innerHTML =
depositar.value || "0.00";

recibeVistaH.innerHTML =
recibe.value || "0.00";

// Actualizar vista horizontal PACEÑA
enviaVistaP.innerHTML =
depositar.value || "0.00";

recibeVistaP.innerHTML =
recibe.value || "0.00";

// Actualizar TC de Paceña
if(tcPacena) tcPacena.textContent = formato(tcMostrado);

// Actualizar comisión en el centro (Paceña)
if(comisionPorcentaje > 0){
    if(comisionCenterPacena) {
        comisionCenterPacena.textContent = "COMISIÓN " + comisionPorcentaje + "%";
        comisionCenterPacena.style.display = "block";
    }
} else {
    if(comisionCenterPacena) comisionCenterPacena.style.display = "none";
}

// Actualizar T/C en el footer (para Chacaltaya)
if(empresa.value === "chacaltaya"){
    tcVista.innerHTML = "T/C " + formato(tcMostrado);
    tcVista.style.display = "block";
} else {
    tcVista.style.display = "none";
}

// Actualizar T/C en el panel
refTc.innerHTML =
"T/C " + formato(tcMostrado);

actualizarMonedas();

}
depositar.addEventListener("input",()=>{

ultimoCampo="depositar";
calcular();

});

recibe.addEventListener("input",()=>{

ultimoCampo="recibe";
calcular();

});

[
empresa,
operacion,
tcBsSoles,
tcSolesBs,
ajusteMas,
ajusteMenos,
comision
].forEach(item=>{

item.addEventListener(
"input",
calcular
);

item.addEventListener(
"change",
calcular
);

});

operacion.addEventListener("change", function(){
    actualizarMonedas();
});

document
.getElementById("btnLimpiar")
.addEventListener("click",()=>{

depositar.value="";
recibe.value="";

enviaVistaH.innerHTML="0.00";
recibeVistaH.innerHTML="0.00";
enviaVistaP.innerHTML="0.00";
recibeVistaP.innerHTML="0.00";

});

document
.getElementById("btnGuardar")
.addEventListener("click",()=>{

html2canvas(
document.getElementById("tarjeta"),
{
scale:3,
backgroundColor:null,
useCORS: true,
logging: false,
width: document.getElementById("tarjeta").offsetWidth,
height: document.getElementById("tarjeta").offsetHeight
}
).then(canvas=>{

const link =
document.createElement("a");

link.download =
"cotizacion.png";

link.href =
canvas.toDataURL();

link.click();

});

});

);

);

localStorage.setItem(

);

);

}

[
empresa,
operacion,
tcBsSoles,

// Guardar TC automáticamente
function guardarTcAutomatically(){
    localStorage.setItem("tcBsSoles", tcBsSoles.value);
    localStorage.setItem("tcSolesBs", tcSolesBs.value);
    localStorage.setItem("ajusteMas", ajusteMas.value);
    localStorage.setItem("ajusteMenos", ajusteMenos.value);
    localStorage.setItem("comision", comision.value);
}

tcBsSoles.addEventListener("input", guardarTcAutomatically);
tcSolesBs.addEventListener("input", guardarTcAutomatically);
ajusteMas.addEventListener("input", guardarTcAutomatically);
ajusteMenos.addEventListener("input", guardarTcAutomatically);
comision.addEventListener("input", guardarTcAutomatically);

window.onload=()=>{

empresa.value =
localStorage.getItem("empresa")
|| "chacaltaya";

tcBsSoles.value =
localStorage.getItem("tcBsSoles")
|| "2.92";

tcSolesBs.value =
localStorage.getItem("tcSolesBs")
|| "2.76";

ajusteMas.value =
localStorage.getItem("ajusteMas")
|| "0.03";

ajusteMenos.value =
localStorage.getItem("ajusteMenos")
|| "0.03";

comision.value =
localStorage.getItem("comision")
|| "3";

operacion.value =
localStorage.getItem("operacion")
|| "soles_bs";

actualizarFecha();
actualizarEmpresa();
actualizarMonedas();
calcular();

};

empresa.addEventListener(
"change",
actualizarEmpresa
);

</script>
